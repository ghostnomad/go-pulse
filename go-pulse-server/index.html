<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Pulse Homelab Monitor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { padding-top: 2rem; }
        .status-badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .bg-green { background-color: #2e7d32; color: white; }
        .bg-red { background-color: #c62828; color: white; } /* <-- Added red badge style */
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>Go-Pulse Dashboard</h1>
            <h2>Homelab System Performance at a Glance</h2>
        </hgroup>
        
        <hr>

        <figure>
            <table>
                <thead>
                    <tr>
                        <th scope="col">Status</th>
                        <th scope="col">Hostname</th>
                        <th scope="col">IP Address</th>
                        <th scope="col">Platform / OS</th>
                        <th scope="col">CPU Configuration</th>
                        <th scope="col">Available RAM</th>
                        <th scope="col">Available Storage</th>
                        <th scope="col">Last Check-In</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .}}
                    <tr>
                        <!-- Dynamic Status Badge Logic -->
                        <td>
                            {{if isStale .Timestamp}}
                            <span class="status-badge bg-red">Offline</span>
                            {{else}}
                            <span class="status-badge bg-green">Active</span>
                            {{end}}
                        </td>
                        <td><strong>{{.Hostname}}</strong></td>
                        <td><code>{{.IPAddress}}</code></td>
                        <td>{{.Platform}} ({{.OS}})</td>
                        <td>{{.CPUModel}} ({{.CPUCount}} Cores)</td>
                        <td>{{bytesToGB .RAMFree}} / {{bytesToGB .RAMTotal}}</td>
                        <td>{{bytesToGB .DiskFree}} / {{bytesToGB .DiskTotal}}</td>
                        <td><small>{{formatTime .Timestamp}}</small></td>
                    </tr>
                    {{else}}
                    <tr>
                        <td colspan="8" style="text-align: center; color: #888;">
                            No servers reporting yet. Boot up your Go-Pulse agents!
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </figure>
    </main>
</body>
</html>
